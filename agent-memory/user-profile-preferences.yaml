## When to use
When you frequently switch between several directories and need a quick way to access them from the command line.

## Approach
Integrate a custom shell function into your .bashrc or equivalent startup file that allows easy navigation using predefined aliases. Use `shell_exec` to run these functions in KDEV's shell environment.

## Example
```shell
function goto_dir() {
    if [[ "$1" == "workdir" ]]; then
        cd /path/to/workdir
    elif [[ "$1" == "projdir" ]]; then
        cd /path/to/projdir
    else
        echo "Usage: goto_dir [workdir|projdir]"
    fi
}
```
This function can be sourced in the user's shell configuration file and called with `goto_dir workdir` or `goto_dir projdir`.

## Pitfalls
Ensure the directory paths are correct to avoid errors when calling the custom function.